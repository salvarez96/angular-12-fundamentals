<h2>NgModel</h2>
<p>Nombre: {{ name }}</p>
<input
  type="text"
  #nameInput="ngModel"
  [(ngModel)]="name"
  minlength="5"
  required
>
<span
  class="error-message"
  [class.invalid]="nameInput?.value?.length && !nameInput.valid"
>
  El nombre debe tener al menos 5 caracteres.
</span>
<hr
  class="line-error"
  [ngClass]="{
    'valid': nameInput.valid,
    'invalid': nameInput.invalid && nameInput?.value?.length
  }"
/>
<div class="styles">
  <div>
    <input type="number" [(ngModel)]="box.width" name="width" id="width">
    <input type="number" [(ngModel)]="box.height" name="height" id="height">
    <input type="color" [(ngModel)]="box.background" name="background" id="background">
  </div>
  <div
    class="box"
    [ngStyle]="{
      'width.px': box.width,
      'height.px': box.height,
      'background': box.background
    }"
  ></div>
</div>

<p>Edad: <span [style.color]="age < 18 ? 'red' : 'green'">{{ age }}</span></p>
<button (click)="increaseAge()">Aumentar edad</button>
<hr />

<h2>NgFor</h2>
<input type="text" [(ngModel)]="newName" name="newName" id="newName" placeholder="Nuevo nombre">
<button type="button" (click)="newName.length > 0 && addNewName()">Agregar nombre</button>
<ul>
  <li *ngFor="let name of names; index as i">
    {{ i + 1 }}. {{ name }}
    <button type="button" (click)="deleteName(i)">Eliminar</button>
  </li>
</ul>
<span *ngIf="names.length === 0">No hay nombres</span>

<hr />

<div class="products-grid">
  <div *ngFor="let product of products">
    <img [src]="product.image" [alt]="product.name" width="300">
    <h2>{{ product.name }}</h2>
    <p>{{ product.price | currency }}</p>
  </div>
</div>

<hr />

<h2>NgSwitch</h2>
<div>
  <input type="text" [(ngModel)]="person.name" placeholder="Ingrese un nombre">
  <div [ngSwitch]="person.name">
    <p *ngSwitchCase="'alice'">Hola Alice</p>
    <p *ngSwitchCase="'bob'">Hola Bob</p>
    <p *ngSwitchDefault>Hola desconocido</p>
  </div>
</div>
